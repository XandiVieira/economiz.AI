spring:
  application:
    name: economizai
  servlet:
    multipart:
      max-file-size: 6MB     # leaves headroom over the app-level 5MB profile-picture cap
      max-request-size: 8MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/economizai}
    username: ${DB_USERNAME:economizai}
    password: ${DB_PASSWORD:economizai}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET:economizai-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000              # access token: 24h
  refresh-expiration: 2592000000    # refresh token: 30d

economizai:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  default-locale: pt
  privacy:
    k-anonymity: 3
  ingestion:
    sefaz:
      timeout-ms: 30000
      user-agent: "economizai/0.1 (+https://github.com/XandiVieira/economiz.AI)"
  collaborative:
    enabled: true                              # master switch — disables all observation writes/reads
    min-households-for-public: 3               # k-anon: aggregate queries return empty until this many distinct households contributed
    min-observations-per-product-market: 5     # don't show reference price for (product, market) until enough samples
    min-observations-for-community-promo: 10   # don't flag a community promo unless this much baseline exists
    community-promo-threshold-pct: 15          # current price < (median - X%) → community promo
    community-promo-recent-window-days: 7      # last N days = "recent" sample; older rows are baseline
    lookback-days: 90                          # observations older than this are excluded from reference + promo calcs
  personal-promo:
    threshold-pct: 10                          # personal promo if price < (user's own median - X%)
    min-purchases-for-baseline: 3              # need this many prior purchases to detect personal promos
  consumption:
    enabled: true                              # master switch for Phase 3 consumption-intelligence endpoints
    min-purchases-for-prediction: 2            # below this, a product is silently skipped from /predictions
    history-lookback-days: 365                 # window for computing inter-purchase intervals
    running-low-threshold-days: 7              # days-until-runout that flips status to RUNNING_LOW
    ran-out-grace-days: 0                      # tolerance before flipping to RAN_OUT
  preferences:
    enabled: true                              # master switch for Phase 2.6 derived preferences
    min-purchases-per-generic: 5               # below this, a generic is silently skipped (no preference shown)
    must-have-brand-share: 0.85                # top brand >= this fraction of purchases → MUST_HAVE
    preferred-brand-share: 0.60                # top brand in [preferred, mustHave) → PREFERRED
  geo:
    user-agent: "economizai/0.1 (xandivieira@gmail.com)"  # required by Nominatim usage policy
    timeout-ms: 8000
    geocode-interval-ms: 600000                # how often the background geocoder scans pending markets (10 min)
    geocode-initial-delay-ms: 30000            # wait this long after startup before first scan
    geocode-delay-ms: 1100                     # 1.1s between geocode calls — Nominatim policy is 1 req/sec/IP
  notifications:
    email:
      enabled: ${NOTIFICATIONS_EMAIL_ENABLED:false}    # turn on once SMTP env vars (host/port/user/pass) are wired in Render
      from: ${EMAIL_FROM:noreply@economiz.ai}
    push:
      expo:
        # Optional bearer token for the Expo Push API. Unauthenticated sends still
        # work for moderate volume; setting this raises rate limits and powers Expo's
        # analytics dashboard. Generate at https://expo.dev → Account → Access Tokens.
        access-token: ${EXPO_ACCESS_TOKEN:}
  profile-picture:
    local-dir: ${PROFILE_PICTURE_DIR:/tmp/economizai/profile-pics}   # dev: local disk. prod: see DEV_NOTES.md
    max-size-mb: 5
  auth:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}    # used in password-reset + email-verification links

springdoc:
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus   # health is public; prometheus is for the metrics scraper
      base-path: /actuator
  endpoint:
    health:
      show-details: never    # don't leak DB/disk internals to anyone hitting /actuator/health
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    # SMTP isn't always wired in dev / Render free tier (see DEV_NOTES) and
    # the mail indicator otherwise tries to ping the server every /health
    # call → returns DOWN → uptime monitors + the keep-alive cron see 503.
    # The AuthEmailSender already degrades gracefully when SMTP is missing.
    mail:
      enabled: false

logging:
  level:
    com.relyon.economizai: INFO
    org.springframework.security: WARN
  pattern:
    # MDC tags in brackets: requestId user receipt item. Empty when not in scope.
    # To deep-debug a flow: filter by receipt=<8-char-id> in your log viewer.
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [req=%X{requestId:-} user=%X{userId:-} rcpt=%X{receiptId:-} item=%X{itemId:-}] %logger{30} - %msg%n"
