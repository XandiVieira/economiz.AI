spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-signing-algorithm
  expiration: 3600000

management:
  health:
    # Mail health indicator tries to ping the SMTP server on every /health
    # call — fine in prod (real SMTP), but flaky in tests (no SMTP server).
    mail:
      enabled: false
