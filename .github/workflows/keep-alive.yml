# Render free tier spins the service down after exactly 15 min of no
# incoming HTTP request (per render.com/docs/free). Next request then
# waits ~30s for cold start. This cron pings a public, no-auth, no-DB
# endpoint just inside that window to keep the JVM warm.
#
# Interval choice: 14 min (just under the 15-min sleep). Trade-off —
# GitHub Actions cron can lag by 5-30 min during peak hours, so on a
# bad-luck day a ping might arrive late and the FE sees one cold start.
# Acceptable for free tier. Bump to */10 if cold starts become annoying.
#
# Cost: zero (free for public repos, well within included minutes for
# private). Drop when we move off Render free tier or when organic
# traffic keeps the service warm by itself.

name: keep-render-warm

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping legal/terms (public, lightweight, no DB hit)
        run: |
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "https://economiz-ai.onrender.com/api/v1/legal/terms")
            echo "attempt $attempt → HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "All 3 ping attempts failed — service may be down"
          exit 1
